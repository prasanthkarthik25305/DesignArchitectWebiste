kind = "web"
previewPath = "/"
title = "MJ Engineers & Architects"
version = "1.0.0"
id = "artifacts/mj-engineers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21697

[services.development]
run = "pnpm --filter @workspace/mj-engineers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mj-engineers", "run", "build" ]
publicDir = "artifacts/mj-engineers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21697"
BASE_PATH = "/"
